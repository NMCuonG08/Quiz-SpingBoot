# =================================
# PRODUCTION ENVIRONMENT CONFIGURATION
# Các giá trị được inject từ Docker environment variables
# =================================

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/employee}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:cuong1182004}

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Production Logging
logging.level.com.example=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

# Swagger - tắt trong production nếu cần
# springdoc.swagger-ui.enabled=false
# springdoc.api-docs.enabled=false
